<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>packet-mapper</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <link rel="stylesheet" href="/static/css/style.css" />
</head>
<body>
  <header>
    <h1>packet-mapper</h1>
    <div id="view-toggle">
      <button id="btn-lines" class="view-btn active" onclick="setViewMode('lines')">Lines</button>
      <button id="btn-heatmap" class="view-btn" onclick="setViewMode('heatmap')">Heat Map</button>
    </div>
    <div id="export-controls">
      <a href="/api/export/pcap" class="export-btn">Export PCAP</a>
      <a href="/api/export/csv" class="export-btn">Export CSV</a>
    </div>
    <div id="status">
      <span id="ws-status" class="badge disconnected">disconnected</span>
      <span id="conn-count">0 connections</span>
      <span id="threat-count" class="threat-badge">0 threats</span>
    </div>
  </header>

  <div id="map"></div>

  <aside id="sidebar">
    <h2>Recent Connections</h2>
    <ul id="conn-list"></ul>
  </aside>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script src="https://unpkg.com/leaflet.heat@0.2.0/dist/leaflet-heat.js"></script>
  <script src="/static/js/map.js"></script>
</body>
</html>
