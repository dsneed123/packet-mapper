<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>packet-mapper</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <link rel="stylesheet" href="/static/css/style.css" />
</head>
<body>
  <header>
    <h1>packet-mapper</h1>
    <div id="status">
      <span id="ws-status" class="badge disconnected">disconnected</span>
      <span id="conn-count">0 connections</span>
    </div>
  </header>

  <div id="map"></div>

  <aside id="sidebar">
    <section id="stats-panel">
      <div id="stats-summary">
        <div class="stat-box">
          <span class="stat-val" id="stat-total">0</span>
          <span class="stat-lbl">packets</span>
        </div>
        <div class="stat-box">
          <span class="stat-val" id="stat-rate">0</span>
          <span class="stat-lbl">pkt/s</span>
        </div>
        <div class="stat-box">
          <span class="stat-val" id="stat-bw">—</span>
          <span class="stat-lbl">est. bw</span>
        </div>
      </div>
      <div class="stats-section">
        <h3 class="stats-heading">Protocols</h3>
        <div class="proto-chart">
          <svg id="proto-pie" viewBox="0 0 100 100" width="84" height="84"></svg>
          <div id="proto-legend"></div>
        </div>
      </div>
      <div class="stats-section">
        <h3 class="stats-heading">Top Countries</h3>
        <div id="countries-bars"></div>
      </div>
      <div class="stats-section">
        <h3 class="stats-heading">Top IPs</h3>
        <div id="ips-bars"></div>
      </div>
    </section>
    <h2>Recent Connections</h2>
    <ul id="conn-list"></ul>
  </aside>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script src="/static/js/map.js"></script>
</body>
</html>
