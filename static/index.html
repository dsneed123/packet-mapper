<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>packet-mapper</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <link rel="stylesheet" href="/static/css/style.css" />
</head>
<body>
  <header>
    <h1>packet-mapper</h1>
    <div id="status">
      <span id="ws-status" class="badge disconnected">disconnected</span>
      <span id="conn-count">0 connections</span>
    </div>
  </header>

  <div id="map"></div>

  <aside id="sidebar">
    <div id="filter-bar">
      <input type="text" id="search-input" placeholder="Search IP / host…" autocomplete="off" spellcheck="false" />
      <div id="filter-protocols">
        <label><input type="checkbox" value="HTTP"  checked> HTTP</label>
        <label><input type="checkbox" value="HTTPS" checked> HTTPS</label>
        <label><input type="checkbox" value="DNS"   checked> DNS</label>
        <label><input type="checkbox" value="ICMP"  checked> ICMP</label>
        <label><input type="checkbox" value="UDP"   checked> UDP</label>
        <label><input type="checkbox" value="TCP"   checked> TCP</label>
      </div>
      <div id="filter-row">
        <select id="filter-country">
          <option value="">All countries</option>
        </select>
        <input type="number" id="filter-port" placeholder="Port" min="1" max="65535" />
      </div>
    </div>
    <h2>Recent Connections</h2>
    <ul id="conn-list"></ul>
  </aside>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script src="/static/js/map.js"></script>
</body>
</html>
